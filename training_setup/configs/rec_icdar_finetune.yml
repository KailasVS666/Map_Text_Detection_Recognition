# ============================================================
# Fine-tuning Config: PP-OCRv4 Recognition on ICDAR 2024
# ============================================================
# Run from the PaddleOCR_Official_Tools/ directory:
#   cd PaddleOCR_Official_Tools
#   python tools/train.py -c ../training_setup/configs/rec_icdar_finetune.yml
# ============================================================

Global:
  use_gpu: true
  epoch_num: 30
  use_amp: true                       # FP16 mixed precision — ~2x faster on RTX 30xx
  scale_loss: 1024.0
  use_dynamic_loss_scaling: true
  amp_level: O1
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ../output/rec_finetune        # saved relative to PaddleOCR_Official_Tools/
  save_epoch_step: 5
  eval_batch_step:
  - 0
  - 500
  cal_metric_during_train: true
  # ── Fine-tuning: start from pretrained PP-OCRv4 English weights ──
  # Download first: see step2_finetune_recognition.py for instructions
  pretrained_model: ../pretrained/en_PP-OCRv4_rec_train/best_accuracy
  checkpoints: null
  save_inference_dir: null
  use_visualdl: false
  infer_img: null
  character_dict_path: ppocr/utils/en_dict.txt
  max_text_length: 40          # maps have longer place names than typical OCR
  infer_mode: false
  use_space_char: true
  distributed: false           # single GPU fine-tuning
  save_res_path: ../output/rec_finetune/predicts.txt

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001      # LOW LR for fine-tuning (10x lower than training from scratch)
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform: null
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
    - CTCHead:
        Neck:
          name: svtr
          dims: 120
          depth: 2
          hidden_dims: 120
          kernel_size:
          - 1
          - 3
          use_guide: true
        Head:
          fc_decay: 1.0e-05
    - NRTRHead:
        nrtr_dim: 384
        max_text_length: 40

Loss:
  name: MultiLoss
  loss_config_list:
  - CTCLoss: null
  - NRTRLoss: null

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: false

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ../train_data/rec       # word crops from step1_extract_icdar_crops.py
    label_file_list:
    - ../train_data/rec/train_list.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecAug: null                    # standard augmentation (rotation, blur, etc.)
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: true
    batch_size_per_card: 32
    drop_last: true
    num_workers: 0                    # 0 = no multiprocessing (fixes Windows slowdown)

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ../train_data/rec
    label_file_list:
    - ../train_data/rec/val_list.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 0
